<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14322A"/>
      <stop offset="1" stop-color="#0B1512"/>
    </linearGradient>
    <linearGradient id="five" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B4F08C"/>
      <stop offset="1" stop-color="#7FCC52"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Ball flight arc -->
  <path d="M 96 400 Q 256 96 396 148" fill="none" stroke="#9EE870" stroke-opacity="0.35"
        stroke-width="10" stroke-linecap="round" stroke-dasharray="2 28"/>

  <!-- The big five -->
  <text x="235" y="378" font-family="Futura, 'Avenir Next', Helvetica, Arial, sans-serif"
        font-size="360" font-weight="800" fill="url(#five)" text-anchor="middle">5</text>

  <!-- Golf ball -->
  <circle cx="396" cy="148" r="46" fill="#F5F7F4"/>
  <circle cx="381" cy="136" r="5" fill="#C9D4CC"/>
  <circle cx="403" cy="132" r="5" fill="#C9D4CC"/>
  <circle cx="392" cy="154" r="5" fill="#C9D4CC"/>
  <circle cx="414" cy="150" r="5" fill="#C9D4CC"/>
  <circle cx="380" cy="166" r="5" fill="#C9D4CC"/>
  <circle cx="402" cy="170" r="5" fill="#C9D4CC"/>

  <!-- Fairway ground line -->
  <path d="M 76 424 Q 256 384 436 424" fill="none" stroke="#2F7D4F" stroke-width="14" stroke-linecap="round"/>
</svg>
